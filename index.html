<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>티메 (Ti-Me)</title>
  <link rel="stylesheet" href="style.css?v=14">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
</head>
<body>

  <div class="character-container"><img id="usagi" src="usagi1.gif" alt="우사기"></div>

  <div id="custom-modal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
      <h3>새 주제 입력</h3>
      <input type="text" id="modal-input" placeholder="주제를 적어주세요" autocomplete="off">
      <div class="modal-buttons">
        <button id="modal-cancel" class="btn-cancel">취소</button>
        <button id="modal-confirm" class="btn-confirm">확인</button>
      </div>
    </div>
  </div>

  <div id="home-screen">
    <h1>티메</h1>
    <div class="home-buttons">
      <button id="btn-new-tier" class="create-btn tier-btn">티어</button>
      <button id="btn-new-ranking" class="create-btn ranking-btn">랭킹</button>
    </div>
    <div class="auto-buttons">
      <button id="btn-auto-webtoon-tier" class="create-btn auto-btn">📚 웹툰 티어</button>
      <button id="btn-auto-webtoon-ranking" class="create-btn auto-btn">🏆 웹툰 랭킹</button>
    </div>
    <div class="auto-buttons" style="margin-top: -20px;">
      <button id="btn-worldcup" class="create-btn auto-btn" style="background:#8B5CF6; border-color:#7C3AED;">⚔️ 웹툰 월드컵 (64강)</button>
      <button id="btn-compare" class="create-btn auto-btn" style="background:#10B981; border-color:#059669;">⚖️ 1:1 비교 모드</button>
    </div>
    
    <div class="project-list" id="project-list"></div>
  </div>

  <div id="workspace-screen" style="display: none;">
    <div class="header" style="padding-top: 20px;">
      <button id="back-btn" class="go-home-btn">⬅</button>
      <h2 id="current-project-title">주제 이름</h2>
    </div>

    <div class="add-section">
      <input type="text" id="item-name" placeholder="후보 이름">
      <input type="file" id="item-image" accept="image/*">
      <input type="text" id="item-memo" placeholder="선정 이유 (메모)">
      <button id="add-item-btn">추가</button>
    </div>

    <div class="workspace-layout">
      <div class="sidebar-pool">
        <p class="pool-label">대기실 (하늘색 그룹)</p><div class="pool" id="pool-skyblue" data-zone="pool-skyblue"></div>
        <p class="pool-label" style="margin-top: 20px;">대기실 (빨간색 그룹)</p><div class="pool" id="pool-red" data-zone="pool-red"></div>
        <p class="pool-label" style="margin-top: 20px;">대기실 (흰색 그룹)</p><div class="pool" id="pool-white" data-zone="pool-white"></div>
      </div>

      <div class="content-area">
        <div id="tier-mode" class="mode-area">
          <div class="tier-row"><div class="tier-label SSR">SSR</div><div class="tier-items" data-zone="SSR"></div></div>
          <div class="tier-row"><div class="tier-label SR">SR</div><div class="tier-items" data-zone="SR"></div></div>
          <div class="tier-row"><div class="tier-label S">S</div><div class="tier-items" data-zone="S"></div></div>
          <div class="tier-row"><div class="tier-label A">A</div><div class="tier-items" data-zone="A"></div></div>
          <div class="tier-row"><div class="tier-label B">B</div><div class="tier-items" data-zone="B"></div></div>
          <div class="tier-row"><div class="tier-label C">C</div><div class="tier-items" data-zone="C"></div></div>
          <div class="tier-row"><div class="tier-label D">D</div><div class="tier-items" data-zone="D"></div></div>
        </div>
        <div id="ranking-mode" class="mode-area" style="display: none;"><div class="ranking-list" id="ranking-list" data-zone="ranking"></div></div>
      </div>
    </div>
  </div>

  <div id="worldcup-screen" style="display: none;" class="game-screen">
    <div class="header" style="padding-top: 20px;"><button class="go-home-btn">⬅</button></div>
    <div class="wc-title">웹툰 이상형 월드컵</div>
    <div id="wc-round-text" class="wc-round">64강 (1/32)</div>
    
    <div class="wc-container">
      <div id="wc-left" class="wc-card" onclick="selectWcItem('left')">왼쪽</div>
      <div class="wc-vs">VS</div>
      <div id="wc-right" class="wc-card" onclick="selectWcItem('right')">오른쪽</div>
    </div>
  </div>

  <div id="compare-screen" style="display: none;" class="game-screen">
    <div class="header" style="padding-top: 20px;"><button class="go-home-btn">⬅</button></div>
    <div class="wc-title">1:1 집중 비교소</div>
    <p style="color:#666; margin-bottom: 30px;">아래 목록에서 작품을 클릭해 '기준'과 '비교 대상'을 설정해보세요!</p>

    <div class="compare-container">
      <div class="compare-slot">
        <div class="compare-label">📌 내 기준점 (고정)</div>
        <div id="comp-fixed" class="wc-card empty">아래 목록에서<br>선택해주세요</div>
      </div>
      <div class="wc-vs">VS</div>
      <div class="compare-slot">
        <div class="compare-label">⚔️ 비교 대상</div>
        <div id="comp-target" class="wc-card empty">아래 목록에서<br>선택해주세요</div>
      </div>
    </div>

    <div style="margin-top: 50px; text-align: left;">
      <h3 style="margin-bottom: 15px;">전체 후보 목록</h3>
      <div id="comp-list" class="comp-list-area"></div>
    </div>
  </div>

  <script src="script.js?v=14"></script>
</body>
</html>
